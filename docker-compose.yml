version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: grid-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PWD:-123456}
      MYSQL_DATABASE: ${DB_NAME:-eladmin}
      TZ: Asia/Shanghai
      # 允许 root 从任意主机连接（方便本地电脑访问）
      MYSQL_ROOT_HOST: '%'
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --bind-address=0.0.0.0
    ports:
      - "13306:3306"  # 云服务器 13306 -> 容器 3306
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - grid-network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: grid-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PWD:-}
    ports:
      - "127.0.0.1:6379:6379"  # Redis 只绑定本地，不对外暴露
    volumes:
      - redis-data:/data
    networks:
      - grid-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: grid-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: mysql       # Docker 网络内通过服务名访问
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-eladmin}
      DB_USER: root
      DB_PWD: ${DB_PWD:-123456}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PWD: ${REDIS_PWD:-}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
    ports:
      - "8080:8000"  # 云服务器 8080 -> 容器 8000
    volumes:
      - ./file:/home/eladmin/file
      - ./avatar:/home/eladmin/avatar
      - ./logs:/app/logs
    networks:
      - grid-network

volumes:
  mysql-data:
  redis-data:

networks:
  grid-network:
    driver: bridge
