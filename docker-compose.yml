version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: grid-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PWD:-123456}
      MYSQL_DATABASE: ${DB_NAME:-eladmin}
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - grid-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PWD:-123456}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: grid-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PWD:-}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - grid-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: grid-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-eladmin}
      DB_USER: root
      DB_PWD: ${DB_PWD:-123456}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PWD: ${REDIS_PWD:-}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
    ports:
      - "8000:8000"
    volumes:
      - ./file:/home/eladmin/file
      - ./avatar:/home/eladmin/avatar
      - ./logs:/app/logs
    networks:
      - grid-network

volumes:
  mysql-data:
  redis-data:

networks:
  grid-network:
    driver: bridge
